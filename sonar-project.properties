# SonarCloud project configuration
sonar.projectKey=brenordv_rust-pad
sonar.organization=raccoon-ninja

# Project metadata
sonar.projectName=rust-pad
sonar.projectVersion=2.12.1

# Source directories (root included so SonarCloud sees workspace Cargo.lock)
sonar.sources=.

# Exclude test files, build artifacts, and non-source directories from analysis
sonar.exclusions=**/target/**,**/tests/**,**/*_test.rs,.github/**,.claude/**,.idea/**,.task-manager/**,.test-files/**,assets/**,packaging/**

# Test sources (for coverage reporting)
sonar.tests=crates
sonar.test.inclusions=**/tests/**,**/*_test.rs

# Exclude data-heavy files from copy-paste detection (CPD)
sonar.cpd.exclusions=**/theme.rs

# Suppress Cargo.lock security finding for workspace member crates.
# Cargo workspaces produce a single Cargo.lock at the root (tracked in git).
# Sub-crate Cargo.toml files do not get their own Cargo.lock by design.
sonar.issue.ignore.multicriteria=cargoLockSubCrates
sonar.issue.ignore.multicriteria.cargoLockSubCrates.ruleKey=rust:S6596
sonar.issue.ignore.multicriteria.cargoLockSubCrates.resourceKey=crates/**/Cargo.toml

# Encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
# SonarCloud uses community plugins for Rust analysis.
# The community Rust plugin (sonar-rust) uses Clippy output for linting.

# Path to Clippy report (generated by the CI workflow)
sonar.rust.clippy.reportPaths=clippy-report.json

# Coverage report (SonarQube Generic Test Data format, converted from LCOV)
sonar.coverageReportPaths=sonar-coverage.xml
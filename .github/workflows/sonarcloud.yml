name: SonarCloud Analysis

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      skip_heartbeat:
        description: "Skip heartbeat commit (useful for manual runs)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history for accurate blame information

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sonar-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sonar-

      - name: Build and test
        run: |
          cargo build --workspace
          cargo test --workspace
        env:
          CARGO_TERM_COLOR: always

      - name: Run clippy for SonarCloud
        run: cargo clippy --workspace --all-targets --message-format=json > clippy-report.json 2>&1 || true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report (LCOV)
        run: cargo tarpaulin --workspace --out lcov --output-dir .

      - name: Convert LCOV to SonarQube generic coverage format
        run: |
          awk '
          BEGIN {
            print "<coverage version=\"1\">"
            current_file = ""
            has_coverage = 0
          }
          /^SF:/ {
            filepath = substr($0, 4)
            sub(/^\/home\/runner\/work\/[^/]+\/[^/]+\//, "", filepath)
            current_file = filepath
            has_coverage = 0
          }
          /^DA:/ && current_file != "" {
            if (!has_coverage) {
              print "  <file path=\"" current_file "\">"
              has_coverage = 1
            }
            split(substr($0, 4), parts, ",")
            covered = (parts[2] + 0 > 0) ? "true" : "false"
            print "    <lineToCover lineNumber=\"" parts[1] "\" covered=\"" covered "\"/>"
          }
          /^end_of_record/ {
            if (current_file != "" && has_coverage) {
              print "  </file>"
            }
            current_file = ""
            has_coverage = 0
          }
          END { print "</coverage>" }
          ' lcov.info > sonar-coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  heartbeat:
    name: Keep Workflow Alive
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_heartbeat != 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update heartbeat timestamp
        run: |
          echo "Last SonarCloud analysis: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/.sonar-heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.sonar-heartbeat
          git diff --cached --quiet || git commit -m "chore: update SonarCloud heartbeat [skip ci]"
          git push
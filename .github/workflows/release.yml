name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rust-pad

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rust-pad.exe
            archive_name: rust-pad-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rust-pad
            archive_name: rust-pad-macos-aarch64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rust-pad
            archive_name: rust-pad-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry & target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev

      - name: Build release binary
        run: cargo build --release -p rust-pad

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/release/${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          zip -j "${{ matrix.archive_name }}" "target/release/${{ matrix.artifact_name }}"

      - name: Package (Linux tar.gz)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar czf "${{ matrix.archive_name }}" -C target/release "${{ matrix.artifact_name }}"

      - name: Build .deb package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          DEB_DIR="rust-pad_${TAG}_amd64"
          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/usr/bin"

          cp target/release/${{ matrix.artifact_name }} "${DEB_DIR}/usr/bin/rust-pad"
          chmod 755 "${DEB_DIR}/usr/bin/rust-pad"

          cat > "${DEB_DIR}/DEBIAN/control" <<EOF
          Package: rust-pad
          Version: ${TAG}
          Section: editors
          Priority: optional
          Architecture: amd64
          Maintainer: Breno RdV
          Description: A cross-platform text editor built with Rust and egui
          Homepage: https://github.com/brenordv/rust-pad
          EOF

          dpkg-deb --build "${DEB_DIR}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

      - name: Upload .deb artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rust-pad-deb
          path: "*.deb"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.deb" \) \
            -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          echo "Generated checksums:"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  arch-pkgbuild:
    name: Verify Arch PKGBUILD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate PKGBUILD exists
        run: |
          if [ ! -f packaging/arch/PKGBUILD ]; then
            echo "ERROR: packaging/arch/PKGBUILD not found"
            exit 1
          fi
          echo "PKGBUILD found:"
          cat packaging/arch/PKGBUILD

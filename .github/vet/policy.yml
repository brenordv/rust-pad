name: General Purpose OSS Best Practices
description: |
  Filter suite for rust-pad's vet workflow.

  Active gates: vulnerabilities, malware, and risky licenses. These are the
  signals that warrant blocking a PR.

  Disabled gates (with rationale): popularity, maintenance, and dangerous-
  workflow. These were originally disabled because printpdf 0.9.1 pulled in
  ~53 transitive crates that tripped heuristic warnings. In v2.1, printpdf
  was replaced with pdf-writer (4 transitive deps), eliminating that noise.
  The only remaining flagged crate is `normpath` from the `opener` subtree.

  The three filters remain disabled because re-enabling them would require
  per-package exemptions for `normpath` and any future false positives.
  Vulnerability, malware, and license checks remain active for every package
  in the tree. If the remaining flagged crate is resolved, consider
  re-enabling the popularity and maintenance filters.
tags:
  - general
  - safedep-managed
filters:
  - name: critical-or-high-vulns
    check_type: CheckTypeVulnerability
    summary: Critical or high risk vulnerabilities were found
    value: |
      vulns.critical.exists(p, true) || vulns.high.exists(p, true)
  - name: risky-oss-licenses
    check_type: CheckTypeLicense
    summary: Risky OSS license was detected
    value: |
      licenses.exists(p, p == "GPL-2.0") ||
      licenses.exists(p, p == "GPL-2.0-only") ||
      licenses.exists(p, p == "GPL-3.0") ||
      licenses.exists(p, p == "GPL-3.0-only") ||
      licenses.exists(p, p == "BSD-3-Clause OR GPL-2.0")
  - name: osv-malware
    check_type: CheckTypeMalware
    summary: Malicious (malware) component detected
    value: |
      vulns.all.exists(v, v.id.startsWith("MAL-"))
